<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <!-- Titles -->
  <title>
    {{- if .IsHome -}}
      {{ .Site.Title }} &middot; {{ $.Site.Params.strapline }}
    {{- else -}}
      {{ .Title }} | {{ .Site.Title }}
    {{- end -}}
  </title>

  {{ partial "head/css.html" . }}

  {{ partial "head/meta-info.html" . }}
</head>
